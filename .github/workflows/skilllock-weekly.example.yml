# Example only — copy to skilllock-weekly.yml and uncomment schedule to enable.
name: skilllock-drift

on:
  # schedule:
  #   - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run drift
        id: drift
        continue-on-error: true
        uses: ./action
        with:
          command: drift

      - name: Open issue on drift
        if: steps.drift.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Automated drift report from [workflow run](${runUrl}).\n\nRun \`skilllock lock\` after review, or \`skilllock reproduce\` to restore.`;
            const title = `skilllock drift detected (${new Date().toISOString().slice(0, 10)})`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'skilllock-drift',
            });
            if (existing.data.some((issue) => issue.title.startsWith('skilllock drift detected'))) {
              core.info('Open drift issue already exists');
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `Automated drift report:\n\n${body}`,
                labels: ['skilllock-drift'],
              });
            }

      - name: Fail if drift failed
        if: steps.drift.outcome == 'failure'
        run: exit 1
